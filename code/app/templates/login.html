{% extends "base.html" %}
{% block content %}
<div class="box">
  <h2>Login</h2>
  {% if error %}<div class="err">{{ error }}</div>{% endif %}
  <form method="POST">
    <input name="email" type="email" placeholder="VT Email" required>
    <input name="password" type="password" placeholder="Password" required>
    <button>Login</button>
  </form>
  <p><a href="/register">Create an account</a></p>
</div>
{% endblock %}
